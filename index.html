<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İTAK Ofis Yoklama Sistemi</title>
    <style>
        :root {
            --primary-color: #003366; /* Kurumsal Lacivert */
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 { color: var(--primary-color); margin: 5px 0; }
        .header p { color: #666; font-size: 14px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary-color); outline: none; }

        button {
            width: 100%;
            padding: 13px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:disabled { background-color: #ccc; }

        #response-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>İTAK Ofis</h2>
        <p>Günlük Yoklama Girişi</p>
    </div>

    <form id="attendanceForm">
        <div class="input-group">
            <label>Ad Soyad</label>
            <input type="text" name="ad_soyad" placeholder="Örn: Ahmet Yılmaz" required>
        </div>

        <div class="input-group">
            <label>Öğrenci Numarası</label>
            <input type="number" name="ogrenci_no" id="studentID" placeholder="Örn: 211024000" required>
        </div>

        <div class="input-group">
            <label>Bölüm</label>
            <input type="text" name="bolum" placeholder="Örn: Elektrik Elektronik Müh." required>
        </div>

        <button type="submit" id="submitBtn">Yoklamayı Kaydet</button>
    </form>

    <div id="response-msg"></div>
</div>

<script>
    const form = document.getElementById('attendanceForm');
    const msgDiv = document.getElementById('response-msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const studentID = document.getElementById('studentID').value;

        // 1 DEFA GİRİŞ KONTROLÜ (Tarayıcı bazlı)
        if (localStorage.getItem('itak_girdi_' + studentID)) {
            showMsg('Bu numara ile bugün zaten giriş yapılmış!', 'red');
            return;
        }

        btn.disabled = true;
        btn.innerText = "Gönderiliyor...";

        const formData = new FormData(form);
        
        // VERİ GÖNDERİMİ (Google Sheets Script URL buraya gelecek)
        fetch('https://script.google.com/macros/s/AKfycbwBZyzTsXw3I_DKC4x7TWO5IVtWNTmUxd4a1pk9zM8KXdSwDQATU90UR_RTDq5yFiN8/exec', {
            method: 'POST',
            body: formData
        })
        .then(res => {
            localStorage.setItem('itak_girdi_' + studentID, 'true');
            showMsg('Yoklamanız başarıyla kaydedildi!', 'green');
            form.reset();
        })
        .catch(err => {
            showMsg('Bir hata oluştu, lütfen tekrar deneyin.', 'red');
            btn.disabled = false;
            btn.innerText = "Yoklamayı Kaydet";
        });
    });

    function showMsg(text, color) {
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.style.backgroundColor = color === 'green' ? '#d4edda' : '#f8d7da';
        msgDiv.style.color = color === 'green' ? '#155724' : '#721c24';
    }
</script>

</body>
</html>
